version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: analytics
    ports:
      - "5432:5432"

  backend:
    build: ..
    container_name: flask_backend
    ports:
      - "5000:5000"
    depends_on:
      - postgres